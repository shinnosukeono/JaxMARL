# R3D2 (DRRN-style text-action Q-learning) on Hanabi.
# Mirrors r3d2.yaml from the upstream R3D2 repo (frozen BERT, 2 LM layers, hid 128).

"TOTAL_TIMESTEPS": 5e8
"NUM_ENVS": 256
"NUM_STEPS": 80
"BUFFER_SIZE": 50000
"BUFFER_BATCH_SIZE": 64

"HIDDEN_SIZE": 128
"EPS_START": 0.1
"EPS_FINISH": 0.001
"EPS_DECAY": 0.1
"MAX_GRAD_NORM": 5.0
"TARGET_UPDATE_INTERVAL": 2500
"TAU": 1.0
"NUM_EPOCHS": 1
"LR": 6.25e-5
"ADAM_EPS": 1.5e-5
"LR_LINEAR_DECAY": False
"LEARNING_STARTS": 10000
"GAMMA": 0.999
"MULTI_STEP": 1
"REW_SCALE": 1.0

# text encoders
"BERT_MODEL_DIR": "baselines/QLearning/pretrained_text/tinybert_l2_flax"
"MAX_OBS_TOKENS": 256
"MAX_ACTION_TOKENS": 12
"INCLUDE_BELIEF": False

# ENV
"ENV_NAME": "hanabi"
"ENV_KWARGS": {
  "num_agents": 2,
}

# evaluate
"TEST_DURING_TRAINING": True
"TEST_INTERVAL": 0.01
"TEST_NUM_STEPS": 80
"TEST_NUM_ENVS": 64

"ALG_NAME": "r3d2_rnn_hanabi"
