# IPPO + π-KL on Hanabi.
# Mirrors ippo_rnn_hanabi.yaml + the PiKL fields from configs/ppo.yaml in
# the upstream R3D2 repo. Set LLM_PRIOR_PATH=null to disable π-KL.

"LR": 5e-4
"NUM_ENVS": 1024
"NUM_STEPS": 128
"TOTAL_TIMESTEPS": 1e10
"FC_DIM_SIZE": 128
"GRU_HIDDEN_DIM": 128
"UPDATE_EPOCHS": 4
"NUM_MINIBATCHES": 4
"GAMMA": 0.99
"GAE_LAMBDA": 0.95
"CLIP_EPS": 0.2
"ENT_COEF": 0.01
"VF_COEF": 0.5
"MAX_GRAD_NORM": 0.5
"ACTIVATION": "relu"
"ENV_NAME": "hanabi"
"ENV_KWARGS": {}
"ANNEAL_LR": True
"SEED": 30

# π-KL settings (matches r3d2/configs/ppo.yaml defaults).
# When LLM_PRIOR_PATH is null, the KL penalty is disabled and this falls back
# to vanilla IPPO (entropy bonus active).
"LLM_PRIOR_PATH": null
"PIKL_LAMBDA": 0.05
"PIKL_BETA": 2.0

# WandB Params
"WANDB_MODE": "disabled"
"ENTITY": ""
"PROJECT": ""
